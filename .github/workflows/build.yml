name: Build & Release Desktop Apps

# ─── Triggers ────────────────────────────────────────────────────────────────
# 1. Push a version tag  →  git tag v2.3.0 && git push origin v2.3.0
# 2. Manual trigger      →  GitHub UI → Actions → "Run workflow"
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g. v2.3.0) — used in release name'
        required: false
        default: 'dev-build'

# ─── Permissions (needed to create GitHub Releases) ──────────────────────────
permissions:
  contents: write

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:
  build:
    strategy:
      fail-fast: false        # if one OS fails, still finish the others
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifacts: "dist/*.exe\ndist/*.zip"
            label: Windows

          - os: ubuntu-22.04
            platform: linux
            artifacts: "dist/*.AppImage\ndist/*.deb"
            label: Linux

          - os: macos-latest
            platform: mac
            artifacts: "dist/*.dmg\ndist/*.zip"
            label: macOS

    runs-on: ${{ matrix.os }}
    name: Build — ${{ matrix.label }}

    steps:
      # ── 1. Source code ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Bun (used locally for node deps — replaces npm) ──────────────────
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── 3 + 4. uv with its own managed Python 3.12 ──────────────────────────
      #   astral-sh/setup-uv downloads python-build-standalone, a fully
      #   self-contained, statically-linked Python that survives relocation.
      #   This is critical: the .venv Python symlinks would point to the CI
      #   runner path and break on the user's machine. Using uv's managed
      #   Python lets us bundle the entire stdlib + binary for Linux/macOS.
      - name: Set up uv + Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: false

      # ── 5. Create native .venv for this OS ──────────────────────────────────
      #       Windows runner → .venv/Scripts/python.exe  (PE32 exe, not a symlink)
      #       Linux/macOS   → .venv/bin/python  (symlink → uv managed Python)
      - name: Install Python dependencies
        shell: bash
        run: uv sync --no-dev

      # ── 5b. Bundle standalone Python runtime (Linux / macOS only) ───────────
      #        The .venv/bin/python symlink points to a CI-runner path that won't
      #        exist on the user's machine. We resolve the real uv-managed Python
      #        installation (which is a self-contained, relocatable build from
      #        python-build-standalone), copy it into bundled-python/, merge
      #        the .venv site-packages in, and ship that directory via
      #        extraResources. electron/main.js then prefers bundled-python/
      #        over .venv on Linux and macOS.
      - name: Bundle Python runtime (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          # Find the uv-managed Python and resolve any symlinks
          UV_PY=$(uv python find 3.12)
          REAL_PY=$(realpath "$UV_PY")
          UV_DIR=$(dirname "$(dirname "$REAL_PY")")
          echo "Python installation dir: $UV_DIR"

          # Copy the full self-contained Python (binary + stdlib + headers)
          mkdir -p bundled-python
          cp -rL "$UV_DIR/." bundled-python/

          # Determine exact Python version string (e.g. "3.12")
          PY_VER=$(bundled-python/bin/python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          echo "Python version: $PY_VER"

          # Merge .venv site-packages (project deps) into the bundled Python
          SRC=".venv/lib/python${PY_VER}/site-packages"
          DST="bundled-python/lib/python${PY_VER}/site-packages"
          if [ -d "$SRC" ]; then
            echo "Merging site-packages → $DST"
            cp -r "$SRC/." "$DST/"
          else
            echo "WARNING: $SRC not found — deps may be missing"
          fi

          # Smoke-test: can the bundled Python import our key packages?
          bundled-python/bin/python3 -c "import uvicorn, fastapi; print('uvicorn', uvicorn.__version__, '| fastapi', fastapi.__version__)"
          echo "Bundle size: $(du -sh bundled-python/ | cut -f1)"

      # ── 5c. Create empty bundled-python/ stub on Windows ─────────────────────
      #        Windows .venv/Scripts/python.exe is a real exe (not a symlink) so
      #        we don't need a standalone bundle there. But extraResources still
      #        lists bundled-python/ — an empty directory prevents build errors.
      - name: Create bundled-python stub (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: mkdir -p bundled-python

      # ── 6. Node dependencies via bun ─────────────────────────────────────────
      - name: Install Node dependencies
        run: bun install --frozen-lockfile

      # ── 7. macOS: accept Xcode licence (needed by electron-builder) ──────────
      - name: Accept Xcode licence
        if: matrix.platform == 'mac'
        run: sudo xcodebuild -license accept || true

      # ── 8. Build ─────────────────────────────────────────────────────────────
      - name: Build (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: bun run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No code-signing cert → skip it. Windows will show a SmartScreen
          # warning on first run; users click "Run anyway".
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: bun run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (macOS)
        if: matrix.platform == 'mac'
        run: bun run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code-signing — users will right-click → Open on first run
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          APPLE_API_KEY_ID: ''

      # ── 9. Upload artifact for the Release job ────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberArc-Outreach-${{ matrix.label }}
          path: |
            ${{ matrix.artifacts }}
          if-no-files-found: warn
          retention-days: 30

  # ─── Publish a GitHub Release with download links ────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only create a Release when a real version tag was pushed
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List files
        run: find release-files -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CyberArc Outreach ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-files/**/*
          body: |
            ## CyberArc MSP AI Outreach — ${{ github.ref_name }}

            ### ⬇️ Download the right file for your system

            | Platform | File | How to install |
            |---|---|---|
            | 🪟 Windows | `*-Setup.exe` | Run the installer. Click **"Run anyway"** if SmartScreen warns (no code-signing cert). |
            | 🪟 Windows | `*.zip` | Portable — unzip and run `CyberArc Outreach.exe` without installing. |
            | 🍎 macOS | `*.dmg` | Open the DMG, drag to Applications. **Right-click → Open** the first time (no Apple notarisation). |
            | 🐧 Linux | `*.AppImage` | `chmod +x *.AppImage && ./CyberArc*.AppImage` |
            | 🐧 Linux | `*.deb` | `sudo dpkg -i *.deb` then find it in your app menu |

            ### 🔒 Your data is safe across upgrades
            The database lives in your **user-data folder** — not the install directory — so upgrading never loses your leads, accounts, or settings.
            - **Windows:** `%APPDATA%\CyberArc Outreach\database.db`
            - **macOS:** `~/Library/Application Support/CyberArc Outreach/database.db`
            - **Linux:** `~/.config/CyberArc Outreach/database.db`

            > 💡 Before upgrading, go to **Records → Download Full Database Backup** as an extra safety net.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
