name: CI — Lint & Test

# ─── Triggers ────────────────────────────────────────────────────────────────
# Run on every push to master and on every PR targeting master.
# Skips when only docs / markdown changed (no code to test).
on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

# ─── Concurrency ─────────────────────────────────────────────────────────────
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff
        run: uv run ruff check . --output-format=github

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: true          # tests need local vault/DB — advisory only in CI
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -x -q --tb=short

  typecheck:
    name: Type Check (Pyright)
    runs-on: ubuntu-latest
    continue-on-error: true          # advisory — don't block merges yet
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run Pyright
        run: uv run pyright app/ --warnings || true
